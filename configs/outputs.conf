# ============================================================================
# outputs.conf — Universal Forwarder Output Configuration (Template)
# ============================================================================
#
# This is a TEMPLATE for the Splunk Universal Forwarder. It defines where
# the forwarder sends collected data. Deploy this to the Windows endpoint at:
#   C:\Program Files\SplunkUniversalForwarder\etc\system\local\outputs.conf
#
# NOTE: Replace SPLUNK_SERVER_IP with the actual IP address of your Splunk
# server (the Ubuntu machine where 01-Install-Splunk.sh was run).
#
# If you use 03-Deploy-Forwarder.ps1, this file is generated automatically
# with the correct IP — you don't need to deploy it manually.
# ============================================================================

# ── TCP Output (Forwarding) Settings ────────────────────────────────────────
# [tcpout] is the global forwarding configuration. All data collected by
# inputs.conf is sent to the server group specified in defaultGroup.
#
# Splunk's forwarding protocol (S2S) compresses data in transit and supports
# indexer acknowledgment to prevent data loss. Unlike raw syslog (UDP 514),
# S2S guarantees delivery and preserves structured metadata.
[tcpout]
defaultGroup = lab-indexer

# ── Target Server Group ──────────────────────────────────────────────────────
# A server group is a named set of Splunk indexers. In a production SOC,
# you'd list multiple indexers for load balancing and high availability:
#   server = indexer1:9997, indexer2:9997, indexer3:9997
#
# In our lab, we have a single Splunk server, so only one server is listed.
#
# IMPORTANT: Replace SPLUNK_SERVER_IP with your Splunk server's actual IP.
# Example: server = 192.168.10.50:9997
[tcpout:lab-indexer]
server = SPLUNK_SERVER_IP:9997

# useACK — indexer acknowledgment (index-time acknowledgment).
# When enabled, the forwarder does NOT delete data from its internal queue
# until the indexer confirms it has been written to disk. This prevents data
# loss during:
#   - Network interruptions between forwarder and indexer
#   - Splunk server restarts or maintenance windows
#   - Disk full conditions on the indexer
#
# Without useACK, the forwarder uses a "fire and forget" model — it sends
# data and assumes it arrived. If the indexer is down, that data is gone.
# In a SOC, losing security logs during an incident is unacceptable.
useACK = true

# ── Forwarder Queue Settings (Optional, uncomment to tune) ──────────────────
# These settings control how much data the forwarder buffers locally when it
# cannot reach the indexer. Defaults are fine for a lab; tune these if you
# see data loss during prolonged indexer outages.
#
# [tcpout]
# maxQueueSize = 500KB
#   How much data to buffer in memory before writing to the persistent queue.
#   Increase if the forwarder generates data faster than it can send.
#
# forceTimebasedAutoLB = true
#   Switches to a new indexer in the group every autoLBFrequency seconds.
#   Relevant only if you have multiple indexers (not needed in this lab).
#
# autoLBFrequency = 30
#   Seconds between load-balancing switches. Only matters with multiple indexers.
