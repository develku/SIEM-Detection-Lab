# ============================================================================
# props.conf — Field Extraction and Parsing Rules
# ============================================================================
#
# props.conf controls HOW Splunk parses incoming data. It defines:
#   - Which timestamps to use and how to interpret them
#   - How to break raw data into individual events
#   - Which transforms.conf rules to apply for index-time routing
#   - Source type renaming and field extraction overrides
#
# Each stanza name matches a sourcetype. When Splunk receives data tagged with
# that sourcetype (set by the forwarder's inputs.conf), it applies the parsing
# rules defined here.
#
# Deploy to: $SPLUNK_HOME/etc/system/local/props.conf
# ============================================================================

# ── Sysmon XML Events ───────────────────────────────────────────────────────
# Sysmon events arrive as XML because the forwarder's inputs.conf has
# renderXml=true. XML format preserves all nested fields (CommandLine,
# ParentCommandLine, Hashes, etc.) that would be truncated in the default
# rendered text format. This is critical — without full CommandLine data,
# you can't write detections for encoded PowerShell, suspicious LOLBins,
# or command-line obfuscation techniques.
#
# TRANSFORMS-routing — applies the index routing rule defined in
# transforms.conf. This is what sends Sysmon data to the "sysmon" index
# instead of the default "main" index.
[XmlWinEventLog:Microsoft-Windows-Sysmon/Operational]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TIME_PREFIX = <TimeCreated SystemTime='
MAX_TIMESTAMP_LOOKAHEAD = 35
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)<Event xmlns=
TRUNCATE = 0
TRANSFORMS-routing = route_sysmon_to_index

# ── Windows Security Log ────────────────────────────────────────────────────
# The Security log is the most voluminous Windows log source. It contains
# logon events (4624/4625), process creation (4688), privilege use (4672),
# account management (4720-4738), and audit policy changes (4719).
#
# KV_MODE = xml — tells Splunk to extract key-value pairs from the XML
# structure. This auto-creates searchable fields like EventCode, Account_Name,
# Logon_Type, etc. without manual field extraction rules.
[WinEventLog:Security]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TIME_PREFIX = <TimeCreated SystemTime='
MAX_TIMESTAMP_LOOKAHEAD = 35
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)<Event xmlns=
TRUNCATE = 0
KV_MODE = xml
TRANSFORMS-routing = route_wineventlog_to_index

# ── Windows System Log ──────────────────────────────────────────────────────
# System log events include service installations (7045), driver loads (7034),
# and system state changes. Parsing is identical to Security since both are
# standard Windows Event Log XML format.
[WinEventLog:System]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TIME_PREFIX = <TimeCreated SystemTime='
MAX_TIMESTAMP_LOOKAHEAD = 35
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)<Event xmlns=
TRUNCATE = 0
KV_MODE = xml
TRANSFORMS-routing = route_wineventlog_to_index

# ── PowerShell ScriptBlock Logging (Operational) ────────────────────────────
# Event ID 4104 contains the full deobfuscated text of PowerShell scripts.
# These events can be large — a single script block may be tens of KB.
# TRUNCATE=0 ensures Splunk doesn't cut off long scripts, which is critical
# because the malicious portion is often at the end of obfuscated payloads.
[XmlWinEventLog:Microsoft-Windows-PowerShell/Operational]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TIME_PREFIX = <TimeCreated SystemTime='
MAX_TIMESTAMP_LOOKAHEAD = 35
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)<Event xmlns=
TRUNCATE = 0
KV_MODE = xml
TRANSFORMS-routing = route_powershell_to_index

# ── PowerShell Classic Log ──────────────────────────────────────────────────
# The legacy "Windows PowerShell" channel records engine lifecycle events
# (Event IDs 400, 403, 600, 800). Less detailed than ScriptBlock logging
# but provides useful context about when PowerShell sessions start/stop
# and which host application launched them (e.g., powershell.exe vs wsmprovhost.exe
# for remoting, which can indicate lateral movement).
[WinEventLog:Windows PowerShell]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TIME_PREFIX = <TimeCreated SystemTime='
MAX_TIMESTAMP_LOOKAHEAD = 35
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)<Event xmlns=
TRUNCATE = 0
KV_MODE = xml
TRANSFORMS-routing = route_powershell_to_index
