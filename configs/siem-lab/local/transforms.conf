# ============================================================================
# transforms.conf — Index-Time Routing Rules
# ============================================================================
#
# transforms.conf defines WHERE Splunk stores incoming data. Each stanza here
# is referenced by a TRANSFORMS-routing line in props.conf. When data matching
# a sourcetype arrives, Splunk applies the corresponding transform to route
# it to the correct index.
#
# Why route to separate indexes?
#
#   1. Search performance — "index=sysmon EventCode=1" only scans the sysmon
#      index, not the entire dataset. With mixed data in "main", every search
#      would scan ALL events, making queries 3-10x slower.
#
#   2. Retention management — keep high-value Sysmon data for 90 days but
#      rotate verbose System logs after 30 days. Separate indexes let you
#      set independent retention policies per data type.
#
#   3. Access control — in enterprise Splunk, RBAC can restrict users to
#      specific indexes. A help desk team might see wineventlog but not
#      powershell. Not needed in a lab, but good architecture to learn.
#
#   4. Capacity planning — "index=sysmon | stats sum(bytes) as total_bytes"
#      instantly shows how much storage Sysmon consumes, making it easy to
#      right-size disk allocation.
#
# Deploy to: $SPLUNK_HOME/etc/system/local/transforms.conf
# ============================================================================

# ── Route Sysmon to sysmon Index ─────────────────────────────────────────────
# All Sysmon events (Event IDs 1-26) go to a dedicated index. Sysmon is the
# primary detection data source — keeping it separate ensures fast search
# performance for threat hunting and detection rule execution.
#
# REGEX — matches everything (catch-all). The routing decision is based on
# the sourcetype match in props.conf, not on event content.
# DEST_KEY = _MetaData:Index — this is the internal Splunk field that controls
# which index receives the event.
# FORMAT = sysmon — the target index name (must match an index created in Splunk).
[route_sysmon_to_index]
REGEX = .
DEST_KEY = _MetaData:Index
FORMAT = sysmon

# ── Route Windows Event Logs to wineventlog Index ────────────────────────────
# Security and System logs are routed together since they share the same
# analytical context (authentication + system state). Analysts commonly search
# both together: "index=wineventlog (EventCode=4624 OR EventCode=7045)"
# to correlate a logon with a service installation.
[route_wineventlog_to_index]
REGEX = .
DEST_KEY = _MetaData:Index
FORMAT = wineventlog

# ── Route PowerShell Logs to powershell Index ────────────────────────────────
# PowerShell ScriptBlock (Event ID 4104) and classic PowerShell logs go to
# their own index. PowerShell events can be very large (full script text) and
# are searched with different patterns than Sysmon or Security logs. Separating
# them keeps the other indexes lean and ensures PowerShell-specific searches
# are fast.
[route_powershell_to_index]
REGEX = .
DEST_KEY = _MetaData:Index
FORMAT = powershell
