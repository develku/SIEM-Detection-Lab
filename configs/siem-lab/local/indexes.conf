# ============================================================================
# indexes.conf — Custom Index Definitions
# ============================================================================
#
# Defines the custom indexes that transforms.conf routes data into.
# Without this file, Splunk rejects events routed to non-existent indexes.
#
# Each index gets its own storage directory under $SPLUNK_DB. In this lab,
# that means /opt/splunk/var/lib/splunk/<index_name>/ inside the container,
# persisted via the splunk-var Docker volume.
#
# Deploy to: $SPLUNK_HOME/etc/system/local/indexes.conf
# ============================================================================

# ── Sysmon Index ───────────────────────────────────────────────────────────
# Stores all Sysmon events (Event IDs 1-26). This is the primary data source
# for endpoint detection — process creation, network connections, file writes,
# registry modifications, and more.
[sysmon]
coldPath = $SPLUNK_DB/sysmon/colddb
homePath = $SPLUNK_DB/sysmon/db
thawedPath = $SPLUNK_DB/sysmon/thaweddb

# ── Windows Event Log Index ────────────────────────────────────────────────
# Stores Security and System log events — logon/logoff, account management,
# service installations, and audit policy changes.
[wineventlog]
coldPath = $SPLUNK_DB/wineventlog/colddb
homePath = $SPLUNK_DB/wineventlog/db
thawedPath = $SPLUNK_DB/wineventlog/thaweddb

# ── PowerShell Index ──────────────────────────────────────────────────────
# Stores PowerShell ScriptBlock logging (Event ID 4104) and classic
# PowerShell engine events (400, 403, 600, 800).
[powershell]
coldPath = $SPLUNK_DB/powershell/colddb
homePath = $SPLUNK_DB/powershell/db
thawedPath = $SPLUNK_DB/powershell/thaweddb
