# ============================================================================
# inputs.conf — Splunk Server Input Configuration
# ============================================================================
#
# This file configures what data the Splunk server accepts. It runs on the
# Splunk indexer (Ubuntu server), NOT on the Windows endpoints.
#
# The primary input is a TCP listener on port 9997 that receives data from
# Splunk Universal Forwarders deployed on Windows lab machines. The forwarders
# handle the collection; this server handles the receiving, parsing, indexing,
# and searching.
#
# Deploy to: $SPLUNK_HOME/etc/system/local/inputs.conf
# ============================================================================

# ── Forwarder Receiving Port ─────────────────────────────────────────────────
# splunktcp://9997 — opens a TCP listener on port 9997 using Splunk's
# proprietary S2S (Splunk-to-Splunk) protocol. Universal Forwarders connect
# to this port and stream log data in a compressed, checksummed format.
#
# Why port 9997? It's Splunk's default receiving port, used in all official
# documentation and default forwarder configs. Using the standard port means
# less custom configuration and easier troubleshooting.
#
# connection_host = dns — resolves the connecting forwarder's IP to a hostname
# via reverse DNS and uses that as the "host" field in events. This makes
# search results more readable ("DC01" instead of "192.168.10.10") and is
# essential for correlating events across log sources from the same endpoint.
[splunktcp://9997]
disabled = false
connection_host = dns

# ── Default Host Tag ─────────────────────────────────────────────────────────
# The host field identifies which machine generated an event. For data that
# arrives without a host tag (e.g., local file monitoring on the Splunk server
# itself), this default value is applied. Forwarded data from UFs will override
# this with the forwarder's own hostname.
[default]
host = splunk-server
