# ============================================================================
# app.conf — SIEM Detection Lab App Metadata
# ============================================================================
#
# Every Splunk app needs an app.conf to identify itself. Splunk loads apps
# from $SPLUNK_HOME/etc/apps/<app_name>/ and applies their configs on top of
# the system defaults. This is the recommended way to customize Splunk —
# configs in apps are isolated, portable, and don't conflict with Splunk's
# internal provisioning scripts.
# ============================================================================

[install]
is_configured = true

[ui]
is_visible = false
label = SIEM Detection Lab

[launcher]
author = SIEM Detection Lab
description = Custom indexes, inputs, and parsing rules for the SIEM Detection Lab
version = 1.0.0
